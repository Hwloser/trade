# Trade 系统基础设施配置
# 仅存放很少变动的基础设施参数（路径、凭证、API keys）
# 用户参数（风险、回测、信号阈值）在 Web UI 的"设置"页面修改，存储于 data/.metadata/trade.db

includes:
  - modules/storage.yaml    # 云存储（Google Drive，默认关闭）
  - modules/security.yaml   # Admin token
  - modules/sentiment.yaml  # RSS feeds / 第三方 API keys

data:
  data_root: "data"
